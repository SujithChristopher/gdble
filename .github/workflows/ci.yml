name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p addons/gdble/bin/windows-x86_64
          copy target\x86_64-pc-windows-msvc\release\gdble.dll addons\gdble\bin\windows-x86_64\gdble.dll

      - name: Prepare artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p addons/gdble/bin/linux-x86_64
          cp target/x86_64-unknown-linux-gnu/release/libgdble.so addons/gdble/bin/linux-x86_64/libgdble.so

      - name: Prepare artifacts (macOS x86_64)
        if: matrix.os == 'macos-13'
        run: |
          mkdir -p addons/gdble/bin/macos-x86_64
          cp target/x86_64-apple-darwin/release/libgdble.dylib addons/gdble/bin/macos-x86_64/libgdble.dylib

      - name: Prepare artifacts (macOS arm64)
        if: matrix.os == 'macos-14'
        run: |
          mkdir -p addons/gdble/bin/macos-arm64
          cp target/aarch64-apple-darwin/release/libgdble.dylib addons/gdble/bin/macos-arm64/libgdble.dylib

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: gdble-${{ matrix.target }}
          path: addons/gdble/bin/
          if-no-files-found: warn